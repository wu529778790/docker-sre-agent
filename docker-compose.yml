version: "3.8"

services:
  docker-sre-agent:
    build: .
    image: docker-sre-agent:latest
    container_name: docker-sre-agent
    restart: unless-stopped
    ports:
      - "6668:6668"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/app/config.yaml:ro
