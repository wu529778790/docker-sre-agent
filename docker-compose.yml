version: "3.8"

services:
  docker-sre-agent:
    build: .
    image: docker-sre-agent:latest
    container_name: docker-sre-agent
    restart: unless-stopped
    env_file: /opt/1panel/apps/openresty/openresty/www/sites/sre.shenzjd.com/index/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/app/config.yaml:ro
