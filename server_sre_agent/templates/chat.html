<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server SRE Agent</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }

/* Login */
.login-overlay { position: fixed; inset: 0; background: #0d1117; display: flex; align-items: center; justify-content: center; z-index: 100; }
.login-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; width: 360px; text-align: center; }
.login-box h2 { margin-bottom: 8px; font-size: 20px; }
.login-box .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
.login-box input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; color: #e6edf3; font-size: 14px; outline: none; margin-bottom: 16px; text-align: center; }
.login-box input:focus { border-color: #58a6ff; }
.login-box button { width: 100%; background: #238636; color: white; border: none; border-radius: 6px; padding: 12px; cursor: pointer; font-size: 14px; font-weight: 500; }
.login-box button:hover { background: #2ea043; }
.login-box .error { color: #f85149; font-size: 12px; margin-top: 8px; display: none; }
.hidden { display: none !important; }

/* Header — fixed top */
.header { flex-shrink: 0; padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 16px; font-weight: 600; }
.header .status { font-size: 12px; color: #3fb950; }
.header .actions { margin-left: auto; display: flex; gap: 8px; }
.header .btn { background: none; border: 1px solid #30363d; color: #8b949e; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px; }
.header .btn:hover { color: #e6edf3; border-color: #8b949e; }

/* Chat app layout */
#chatApp { display: flex; flex-direction: column; height: 100vh; }

/* Messages — scrollable middle */
.chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

.message { max-width: 85%; padding: 14px 18px; border-radius: 10px; line-height: 1.7; font-size: 14px; word-wrap: break-word; }
.message.user { align-self: flex-end; background: #1f6feb; color: white; border-bottom-right-radius: 4px; }
.message.bot { align-self: flex-start; background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 4px; }

/* Markdown in bot messages */
.message.bot h1, .message.bot h2, .message.bot h3 { margin: 16px 0 8px; color: #e6edf3; }
.message.bot h1 { font-size: 18px; }
.message.bot h2 { font-size: 16px; }
.message.bot h3 { font-size: 14px; }
.message.bot p { margin: 8px 0; }
.message.bot ul, .message.bot ol { padding-left: 24px; margin: 8px 0; }
.message.bot li { margin: 4px 0; }
.message.bot strong { color: #f0f6fc; }
.message.bot a { color: #58a6ff; text-decoration: none; }
.message.bot a:hover { text-decoration: underline; }
.message.bot blockquote { border-left: 3px solid #30363d; padding-left: 12px; margin: 8px 0; color: #8b949e; }
.message.bot table { border-collapse: collapse; margin: 12px 0; width: 100%; }
.message.bot th, .message.bot td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; font-size: 13px; }
.message.bot th { background: #21262d; font-weight: 600; }

/* Code blocks */
.message.bot pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px; overflow-x: auto; margin: 10px 0; position: relative; }
.message.bot pre code { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.5; background: none; padding: 0; color: #e6edf3; }
.message.bot :not(pre) > code { background: #21262d; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; color: #f08770; }

/* Copy button for code blocks */
.code-header { display: flex; justify-content: space-between; align-items: center; background: #21262d; border: 1px solid #30363d; border-bottom: none; border-radius: 8px 8px 0 0; padding: 6px 12px; font-size: 12px; color: #8b949e; }
.code-header + pre { border-radius: 0 0 8px 8px; margin-top: 0; border-top: none; }
.copy-btn { background: none; border: 1px solid #30363d; color: #8b949e; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 11px; }
.copy-btn:hover { color: #e6edf3; border-color: #8b949e; }

/* Tool events */
.tool-event { align-self: flex-start; padding: 5px 12px; border-radius: 6px; background: #161b22; border: 1px solid #30363d; font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
.tool-event .icon { font-size: 14px; }
.tool-event.done { border-color: #238636; color: #3fb950; }

/* Thinking */
.thinking { align-self: flex-start; padding: 14px 18px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
.thinking .dots { display: flex; gap: 4px; }
.thinking .dots span { width: 6px; height: 6px; background: #58a6ff; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
.thinking .dots span:nth-child(1) { animation-delay: 0s; }
.thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
.thinking .label { color: #8b949e; font-size: 13px; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

/* Input — fixed bottom */
.input-area { flex-shrink: 0; padding: 16px 20px; background: #161b22; border-top: 1px solid #30363d; display: flex; gap: 10px; }
.input-area textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px 14px; color: #e6edf3; font-size: 14px; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 150px; line-height: 1.5; }
.input-area textarea:focus { border-color: #58a6ff; }
.input-area textarea::placeholder { color: #484f58; }
.input-area button { background: #238636; color: white; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 14px; font-weight: 500; }
.input-area button:hover { background: #2ea043; }
.input-area button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

/* Quick actions — above input */
.quick-actions { flex-shrink: 0; padding: 8px 20px 12px; background: #161b22; display: flex; gap: 8px; flex-wrap: wrap; }
.quick-actions button { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 6px 14px; color: #8b949e; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.quick-actions button:hover { background: #30363d; color: #e6edf3; border-color: #8b949e; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🤖 Server SRE Agent</h2>
    <p class="subtitle">请输入访问密钥</p>
    <input type="password" id="tokenInput" placeholder="Access Token" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <p class="error" id="loginError">密钥错误，请重试</p>
  </div>
</div>

<!-- Chat -->
<div id="chatApp" class="hidden">
  <div class="header">
    <span style="font-size: 20px;">🤖</span>
    <h1>Server SRE Agent</h1>
    <span class="status">● 在线</span>
    <div class="actions">
      <button class="btn" onclick="clearHistory()">🗑️ 清空</button>
      <button class="btn" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="chat-container" id="chat">
    <div class="message bot">
      <p>👋 你好！我是 Server SRE Agent。</p>
      <p>你可以问我：</p>
      <ul>
        <li>服务器上有什么垃圾？</li>
        <li>Docker 环境分析和清理建议</li>
        <li>哪个容器占用内存最多？</li>
        <li>帮我检查服务器健康状态</li>
      </ul>
    </div>
  </div>

  <div class="quick-actions">
    <button onclick="sendQuick('服务器上有什么垃圾')">🗑️ 垃圾扫描</button>
    <button onclick="sendQuick('所有容器的状态和资源占用')">📊 资源占用</button>
    <button onclick="sendQuick('分析 Docker 环境，给出清理建议')">🔍 Docker 分析</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="输入消息..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
// Configure marked
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true,
});

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let isProcessing = false;
let authToken = localStorage.getItem('sre_token') || '';

// --- Auth ---
async function doLogin() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await res.json();
    if (data.ok) {
      authToken = token;
      localStorage.setItem('sre_token', token);
      showChat();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('sre_token');
  authToken = '';
  document.getElementById('chatApp').classList.add('hidden');
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('tokenInput').value = '';
}

async function clearHistory() {
  await fetch('/api/chat/clear', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${authToken}` },
  });
  chat.innerHTML = `<div class="message bot">
    <p>👋 对话已清空。你可以问我任何问题。</p>
  </div>`;
}

function showChat() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('chatApp').classList.remove('hidden');
  input.focus();
}

// Auto-login
if (authToken) {
  fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: authToken }),
  }).then(r => r.json()).then(d => {
    if (d.ok) showChat();
    else localStorage.removeItem('sre_token');
  }).catch(() => {});
}

// --- Chat ---
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function sendQuick(text) { input.value = text; send(); }
function scrollToBottom() { chat.scrollTop = chat.scrollHeight; }

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMarkdown(text) {
  if (!text) return '';
  // Use marked.js for proper Markdown rendering
  const html = marked.parse(text);
  // Add copy buttons to code blocks
  return html.replace(/<pre><code([^>]*)>([\s\S]*?)<\/code><\/pre>/g,
    (match, attrs, code) => {
      const lang = attrs.match(/class="language-(\w+)"/)?.[1] || '';
      return `<div class="code-header"><span>${lang || 'code'}</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><pre><code${attrs}>${code}</code></pre>`;
    }
  );
}

function copyCode(btn) {
  const code = btn.closest('.code-header').nextElementSibling.querySelector('code');
  navigator.clipboard.writeText(code.textContent);
  btn.textContent = '已复制';
  setTimeout(() => btn.textContent = '复制', 2000);
}

function addMessage(type, content) {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  if (type === 'bot') {
    div.innerHTML = renderMarkdown(content);
    // Highlight all code blocks
    div.querySelectorAll('pre code').forEach(block => {
      hljs.highlightElement(block);
    });
  } else {
    div.textContent = content;
  }
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function addToolEvent(icon, text, isDone = false) {
  const div = document.createElement('div');
  div.className = `tool-event${isDone ? ' done' : ''}`;
  div.innerHTML = `<span class="icon">${icon}</span>${text}`;
  chat.appendChild(div);
  scrollToBottom();
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div><span class="label">思考中...</span>';
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

async function send() {
  const message = input.value.trim();
  if (!message || isProcessing) return;

  isProcessing = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', message);
  const thinking = addThinking();

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify({ message }),
    });

    if (!res.ok) {
      thinking.remove();
      addMessage('bot', '❌ ' + (res.status === 401 ? '密钥无效' : '请求失败'));
      isProcessing = false;
      sendBtn.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', finalText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          if (event.type === 'tool_call') addToolEvent('🔧', `调用: ${event.name}`);
          else if (event.type === 'tool_result') addToolEvent('✅', `${event.name} 完成`, true);
          else if (event.type === 'final') finalText = event.text;
          else if (event.type === 'error') finalText = '❌ ' + event.text;
        } catch (e) {}
      }
    }

    thinking.remove();
    if (finalText) addMessage('bot', finalText);
  } catch (e) {
    thinking.remove();
    addMessage('bot', '❌ 连接失败: ' + e.message);
  }

  isProcessing = false;
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});
</script>
</body>
</html>
