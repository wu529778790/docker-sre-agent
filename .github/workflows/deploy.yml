name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
            CONTAINER="${{ github.event.repository.name }}"
            DEPLOY_DIR="/opt/1panel/apps/openresty/openresty/www/sites/sre.shenzjd.com/index"
            ENV_FLAG=""
            if [ -f "$DEPLOY_DIR/.env" ]; then
              ENV_FLAG="-v $DEPLOY_DIR/.env:/app/.env:ro"
            fi

            # Save current image for rollback
            OLD_IMAGE=$(sudo docker inspect --format='{{.Config.Image}}' "$CONTAINER" 2>/dev/null || echo "")

            sudo docker pull "$IMAGE"
            sudo docker stop "$CONTAINER" || true
            sudo docker rm "$CONTAINER" || true
            sudo docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 6700:6700 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              $ENV_FLAG \
              "$IMAGE"

            # Health check — wait 15s, rollback if unhealthy
            sleep 15
            STATUS=$(sudo docker inspect --format='{{.State.Status}}' "$CONTAINER" 2>/dev/null || echo "unknown")
            if [ "$STATUS" != "running" ]; then
              echo "New container not running (status: $STATUS), rolling back..."
              sudo docker stop "$CONTAINER" || true
              sudo docker rm "$CONTAINER" || true
              if [ -n "$OLD_IMAGE" ]; then
                sudo docker run -d \
                  --name "$CONTAINER" \
                  --restart unless-stopped \
                  -p 6700:6700 \
                  -v /var/run/docker.sock:/var/run/docker.sock \
                  $ENV_FLAG \
                  "$OLD_IMAGE"
                echo "Rolled back to $OLD_IMAGE"
              fi
            else
              echo "Deploy successful (status: $STATUS)"
            fi

            sudo docker image prune -f
